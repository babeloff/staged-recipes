context:
  name: rotz
  version: "1.2.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/babeloff/rotz/archive/refs/tags/v${{ version }}.tar.gz
  sha256: 2942359688bbad11848c18d523dfd29dbc20f27a37db394185dc787f72687b1c

build:
  number: 0
  script:
    - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml
    - if: unix
      then: $BUILD_PREFIX/bin/cargo install --locked --root $PREFIX --path .
    - if: win
      then: "%BUILD_PREFIX%\\Scripts\\cargo.exe install --locked --root %PREFIX% --path ."
  skip:
    - win and vc<14

requirements:
  build:
    - ${{ compiler('rust') }}
    - if: unix
      then:
        - ${{ compiler('c') }}
        - pkg-config
    - if: win
      then: ${{ compiler('m2w64_c') }}
    - ${{ stdlib("c") }}
    - cargo-bundle-licenses
  host:
    - if: unix
      then: openssl
  run:

tests:
  - script:
      - rotz --help
      - rotz --version

about:
  homepage: https://volllly.github.io/rotz/
  summary: Fully cross platform dotfile manager and dev environment bootstrapper written in Rust.
  description: |
    rotz is a fully cross platform dotfile manager and dev environment bootstrapper written in Rust.
    It helps you manage your dotfiles across different platforms and environments with powerful
    templating and linking capabilities.
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  documentation: https://docs.rs/rotz/
  repository: https://github.com/babeloff/rotz

extra:
  recipe-maintainers:
    - conda-forge-admin
